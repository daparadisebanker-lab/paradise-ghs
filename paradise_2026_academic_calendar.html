<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paradise GHS - Interactive Academic Calendar</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

        :root {
            --bg-color: #000000;
            --text-main: #f5f5f7;
            --text-muted: #86868b;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --accent: #2997ff;
            --font-family: 'SF Pro Display', 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            
            --bloque1: #32d74b;
            --bloque2: #ffd60a;
            --bloque3: #ff9f0a;
            --bloque4: #ff375f;
            --exam-color: #bf5af2;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-family);
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            overflow-x: hidden;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            -webkit-font-smoothing: antialiased;
        }

        .ambient-glow {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100vw;
            height: 100vh;
            background: radial-gradient(circle at 30% 30%, rgba(41, 151, 255, 0.08) 0%, transparent 40%),
                        radial-gradient(circle at 70% 70%, rgba(191, 90, 242, 0.08) 0%, transparent 40%);
            z-index: -1;
            filter: blur(80px); /* slightly reduced blur for performance */
            animation: pulseGlow 15s infinite alternate ease-in-out;
            pointer-events: none;
        }

        @keyframes pulseGlow {
            0% { opacity: 0.5; transform: translate(-50%, -50%) scale(1) rotate(0deg); }
            100% { opacity: 0.8; transform: translate(-50%, -50%) scale(1.1) rotate(5deg); }
        }

        .dashboard {
            width: 100%;
            max-width: 1200px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            padding: 32px 24px;
            min-height: 100vh;
        }

        /* Top Header & Stats */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            opacity: 0;
            animation: fadeUp 0.8s ease forwards;
            gap: 24px;
            flex-wrap: wrap;
        }

        .header-title {
            display: flex;
            flex-direction: column;
            gap: 4px;
            flex: 1 1 300px;
        }

        h1 {
            font-size: clamp(1.8rem, 4vw, 2.2rem);
            font-weight: 700;
            letter-spacing: -0.02em;
            background: linear-gradient(180deg, #fff 0%, #a1a1a6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1.1;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: clamp(0.9rem, 2vw, 1.1rem);
            font-weight: 400;
        }

        .quick-stats {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .stat-badge {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            padding: 8px 16px;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            min-width: 80px;
        }

        .stat-val { font-size: 1.3rem; font-weight: 700; color: white; line-height: 1; margin-bottom: 2px;}
        .stat-lbl { font-size: 0.65rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; text-align: center;}

        /* Interactive Timeline */
        .timeline-selector {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 16px 5%;
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            opacity: 0;
            animation: fadeUp 0.8s ease 0.2s forwards;
            position: relative;
        }

        .timeline-track {
            position: absolute;
            top: 50%;
            left: 10%;
            right: 10%;
            height: 2px;
            background: rgba(255,255,255,0.1);
            transform: translateY(-50%);
            z-index: 1;
        }

        .timeline-step {
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .step-circle {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(0,0,0,0.8);
            border: 2px solid rgba(255,255,255,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text-muted);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .step-label {
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            transition: color 0.3s ease;
            white-space: nowrap;
        }

        .timeline-step:hover .step-circle {
            transform: scale(1.1);
            border-color: rgba(255,255,255,0.4);
            color: white;
        }

        .timeline-step.active .step-circle {
            transform: scale(1.2);
            border-color: currentColor;
            color: white;
            box-shadow: 0 0 15px currentColor;
        }

        .timeline-step.active .step-label {
            color: white;
            font-weight: 700;
        }

        .timeline-step[data-id="1"] .step-circle { color: var(--bloque1); }
        .timeline-step[data-id="2"] .step-circle { color: var(--bloque2); }
        .timeline-step[data-id="3"] .step-circle { color: var(--bloque3); }
        .timeline-step[data-id="4"] .step-circle { color: var(--bloque4); }

        /* Main Content Dashboard */
        .content-panel {
            flex: 1;
            background: linear-gradient(135deg, rgba(255,255,255,0.03) 0%, rgba(255,255,255,0.01) 100%);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 32px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 32px;
            opacity: 0;
            animation: fadeUp 0.8s ease 0.4s forwards;
            position: relative;
            overflow: hidden;
            align-content: start;
        }

        .content-transition {
            animation: contentFadeIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes contentFadeIn {
            from { opacity: 0; transform: scale(0.98) translateY(10px); filter: blur(4px); }
            to { opacity: 1; transform: scale(1) translateY(0); filter: blur(0); }
        }

        /* Left Side: Schedule & Units */
        .schedule-col {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .block-header {
            margin-bottom: 0;
        }

        .block-name {
            font-size: clamp(1.5rem, 3vw, 1.8rem);
            font-weight: 700;
            color: white;
            margin-bottom: 6px;
            letter-spacing: -0.01em;
            line-height: 1.2;
        }

        .block-dates {
            font-size: clamp(0.9rem, 2vw, 1rem);
            color: var(--accent);
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .unit-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .unit-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.05);
            padding: 12px 16px;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
        }
        
        .unit-card > div:first-child { flex: 1; }

        .unit-card .u-name { font-weight: 600; color: white; font-size: 1rem; }
        .unit-card .u-date { font-size: 0.85rem; color: var(--text-muted); margin-top: 2px; }
        .unit-card .u-weeks { background: rgba(255,255,255,0.1); padding: 4px 10px; border-radius: 10px; font-size: 0.75rem; font-weight: 600; color: white; white-space: nowrap;}

        .banner {
            background: rgba(255,255,255,0.06);
            border-left: 4px solid var(--text-muted);
            padding: 12px 16px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 500;
            color: white;
            font-size: 0.9rem;
            line-height: 1.4;
        }

        /* Right Side: Examinations */
        .exams-col {
            display: flex;
            flex-direction: column;
            background: rgba(191, 90, 242, 0.05);
            border: 1px solid rgba(191, 90, 242, 0.15);
            border-radius: 16px;
            padding: 24px;
            position: relative;
            height: 100%;
        }

        .exams-col::before {
            content: '';
            position: absolute;
            top: 0; right: 0; width: 150px; height: 150px;
            background: radial-gradient(circle, rgba(191, 90, 242, 0.15) 0%, transparent 70%);
            border-radius: 50%;
            transform: translate(30%, -30%);
            pointer-events: none;
        }

        .exams-title {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: var(--exam-color);
            margin-bottom: 20px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .exams-title svg { width: 16px; height: 16px; }

        .exam-cards {
            display: flex;
            flex-direction: column;
            gap: 12px;
            height: 100%;
        }

        .exam-card {
            background: rgba(0,0,0,0.4);
            border: 1px solid rgba(191, 90, 242, 0.2);
            padding: 20px;
            border-radius: 12px;
            transition: transform 0.3s ease, border-color 0.3s ease;
            display: flex;
            flex-direction: column;
            justify-content: center;
            flex: 1; /* stretches to fill space beautifully */
        }

        .exam-card:hover {
            transform: translateY(-2px);
            border-color: rgba(191, 90, 242, 0.5);
            box-shadow: 0 4px 20px rgba(191, 90, 242, 0.1);
        }

        .e-val { color: var(--exam-color); font-size: 0.75rem; font-weight: 700; text-transform: uppercase; margin-bottom: 6px; }
        .e-name { font-size: 1.25rem; color: white; font-weight: 600; margin-bottom: 6px; line-height: 1.2;}
        .e-session { font-size: 0.95rem; color: var(--text-main); font-weight: 500; margin-bottom: 4px; }
        .e-subs { font-size: 0.85rem; color: var(--text-muted); line-height: 1.4;}

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); filter: blur(4px);}
            to { opacity: 1; transform: translateY(0); filter: blur(0);}
        }

        /* Responsive Improvements */
        @media (max-width: 900px) {
            .content-panel { 
                grid-template-columns: 1fr;
                padding: 24px;
                gap: 24px;
            }
            .dashboard { padding: 24px 16px; min-height: 100vh;}
            .timeline-track { left: 5%; right: 5%; }
            .step-label { font-size: 0.7rem; }
            .exams-col { padding: 20px; }
            .exam-card { flex: none; padding: 16px; } /* Reset flex behavior on mobile */
        }
        
        @media (max-width: 500px) {
            .timeline-selector { padding: 12px 16px; }
            .step-circle { width: 32px; height: 32px; font-size: 0.9rem; }
            .step-label { display: none; /* Hide labels on very small screens, keep just circles */ }
            .quick-stats { display: grid; grid-template-columns: 1fr 1fr 1fr; width: 100%; }
            .stat-badge { min-width: auto; padding: 8px;}
        }

        /* Handle short height screens gracefully */
        @media (max-height: 700px) and (min-width: 901px) {
            .dashboard { padding: 16px 24px; gap: 12px;}
            .content-panel { padding: 20px; gap: 20px; }
            .exam-card { padding: 16px; }
            .top-bar { margin-bottom: 0; }
        }
    </style>
</head>
<body>
    <div class="ambient-glow"></div>

    <div class="dashboard">
        <!-- Top Bar -->
        <div class="top-bar">
            <div class="header-title">
                <h1>Academic Calendar</h1>
                <p class="subtitle">Paradise GHS Interactive Examination Dashboard</p>
            </div>
            <div class="quick-stats">
                <div class="stat-badge"><span class="stat-val">39</span><span class="stat-lbl">Weeks</span></div>
                <div class="stat-badge"><span class="stat-val">4</span><span class="stat-lbl">Blocks</span></div>
                <div class="stat-badge"><span class="stat-val">8</span><span class="stat-lbl">Mock Exams</span></div>
            </div>
        </div>

        <!-- Timeline Selector -->
        <div class="timeline-selector" id="timeline">
            <div class="timeline-track"></div>
            <div class="timeline-step active" data-id="1" onclick="selectBlock(1)">
                <div class="step-circle">I</div>
                <div class="step-label">First Block</div>
            </div>
            <div class="timeline-step" data-id="2" onclick="selectBlock(2)">
                <div class="step-circle">II</div>
                <div class="step-label">Second Block</div>
            </div>
            <div class="timeline-step" data-id="3" onclick="selectBlock(3)">
                <div class="step-circle">III</div>
                <div class="step-label">Third Block</div>
            </div>
            <div class="timeline-step" data-id="4" onclick="selectBlock(4)">
                <div class="step-circle">IV</div>
                <div class="step-label">Fourth Block</div>
            </div>
        </div>

        <!-- Dynamic Content Panel -->
        <div class="content-panel" id="contentPanel">
            <!-- Injected via JS -->
        </div>
    </div>

    <script>
        const blocksData = {
            1: {
                color: "var(--bloque1)",
                name: "First Academic Block",
                dates: "March 4 – May 8",
                units: [
                    { name: "Unit 1", dates: "March 4 – April 3", weeks: "5 weeks" },
                    { name: "Unit 2", dates: "April 6 – May 1", weeks: "5 weeks" }
                ],
                banners: [
                    { icon: "☀️", text: "Vacation: May 4 – May 8" }
                ],
                program: "Cambridge IGCSE",
                exams: [
                    { session: "Session 1 Mock", week: "April 1 - 3", subs: "Unit 1 Assessment" },
                    { session: "Session 2 Mock", week: "April 27 - May 1", subs: "Unit 2 Assessment" }
                ]
            },
            2: {
                color: "var(--bloque2)",
                name: "Second Academic Block",
                dates: "May 11 – July 31",
                units: [
                    { name: "Unit 3", dates: "May 11 – June 12", weeks: "5 weeks" },
                    { name: "Unit 4", dates: "June 15 – July 17", weeks: "5 weeks" }
                ],
                banners: [
                    { icon: "🎓", text: "Academic Alignment Week: July 20 – July 24" },
                    { icon: "☀️", text: "Vacation: July 27 – July 31" }
                ],
                program: "IB Diploma",
                exams: [
                    { session: "Session 1 Mock", week: "June 8 - 12", subs: "Unit 3 Assessment" },
                    { session: "Session 2 Mock", week: "July 13 - 17", subs: "Unit 4 Assessment" }
                ]
            },
            3: {
                color: "var(--bloque3)",
                name: "Third Academic Block",
                dates: "August 3 – October 16",
                units: [
                    { name: "Unit 5", dates: "August 3 – September 4", weeks: "5 weeks" },
                    { name: "Unit 6", dates: "September 7 – October 9", weeks: "5 weeks" }
                ],
                banners: [
                    { icon: "☀️", text: "Vacation: October 12 – October 16" }
                ],
                program: "OSSD",
                exams: [
                    { session: "Session 1 Mock", week: "September 1 - 4", subs: "Unit 5 Assessment" },
                    { session: "Session 2 Mock", week: "October 5 - 9", subs: "Unit 6 Assessment" }
                ]
            },
            4: {
                color: "var(--bloque4)",
                name: "Fourth Academic Block",
                dates: "October 19 – December 18",
                units: [
                    { name: "Unit 7", dates: "October 19 – November 20", weeks: "5 weeks" },
                    { name: "Unit 8", dates: "November 23 – December 18", weeks: "4 weeks" }
                ],
                banners: [],
                program: "Singapore GCE",
                exams: [
                    { session: "Session 1 Mock", week: "November 16 - 20", subs: "Unit 7 Assessment" },
                    { session: "Session 2 Mock", week: "December 14 - 18", subs: "Unit 8 Assessment" }
                ]
            }
        };

        function selectBlock(id) {
            // Update UI selector
            document.querySelectorAll('.timeline-step').forEach(step => {
                step.classList.remove('active');
            });
            event.currentTarget.classList.add('active');

            // Update Content
            renderContent(id);
        }

        function renderContent(id) {
            const data = blocksData[id];
            const panel = document.getElementById('contentPanel');
            
            // Remove animation class to re-trigger it
            panel.classList.remove('content-transition');
            void panel.offsetWidth; // trigger reflow
            panel.classList.add('content-transition');

            let unitsHtml = data.units.map(u => `
                <div class="unit-card">
                    <div>
                        <div class="u-name">${u.name}</div>
                        <div class="u-date">${u.dates}</div>
                    </div>
                    <div class="u-weeks">${u.weeks}</div>
                </div>
            `).join('');

            let bannersHtml = data.banners.map(b => `
                <div class="banner">
                    <span>${b.icon}</span> ${b.text}
                </div>
            `).join('');

            let examsHtml = data.exams.map(e => `
                <div class="exam-card">
                    <div class="e-val">${e.week}</div>
                    <div class="e-name">${data.program}</div>
                    <div class="e-session">${e.session}</div>
                    <div class="e-subs">${e.subs}</div>
                </div>
            `).join('');

            panel.innerHTML = `
                <div class="schedule-col">
                    <div class="block-header">
                        <div class="block-dates" style="color: ${data.color}">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
                            ${data.dates}
                        </div>
                        <div class="block-name">${data.name}</div>
                    </div>
                    
                    <div class="unit-list">
                        ${unitsHtml}
                    </div>
                    ${bannersHtml}
                </div>
                
                <div class="exams-col">
                    <div class="exams-title">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
                        Mock Exam Strategy
                    </div>
                    <div class="exam-cards">
                        ${examsHtml}
                    </div>
                </div>
            `;
        }

        // Init
        document.addEventListener('DOMContentLoaded', () => {
            renderContent(1);
        });
    </script>
</body>
</html>
